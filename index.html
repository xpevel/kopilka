<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Копилка</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Baloo+2:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --goal: 85000;
    --bg1:#fef6e4;
    --bg2:#fce1c9;
    --ink:#3a2d1f;
    --ink-soft:#7a6651;
    --jar-glass:rgba(255,255,255,.35);
    --jar-edge:#bfe3d6;
    --liquid1:#7ed3b2;
    --liquid2:#3fb98f;
    --liquid3:#2a9d76;
    --accent:#ff8c5a;
    --accent2:#ffd166;
    --card:#fffdf8;
    --shadow:0 12px 30px rgba(120,80,40,.16);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;}
  body{
    font-family:'Fredoka',sans-serif;
    color:var(--ink);
    background:
      radial-gradient(1200px 600px at 80% -10%, #fff7e8 0%, transparent 60%),
      radial-gradient(900px 500px at 0% 110%, #ffe9d2 0%, transparent 55%),
      linear-gradient(160deg, var(--bg1), var(--bg2));
    min-height:100vh;
    padding:20px 16px 60px;
  }
  .wrap{max-width:1000px;margin:0 auto;}
  header{text-align:center;margin:6px 0 22px;}
  header h1{
    font-family:'Baloo 2',cursive;
    font-size:clamp(28px,6vw,46px);
    font-weight:800;
    letter-spacing:.5px;
    color:var(--ink);
    text-shadow:0 2px 0 #fff;
  }
  header p{color:var(--ink-soft);font-size:clamp(14px,3.4vw,17px);margin-top:4px;}

  .stage{
    display:grid;
    grid-template-columns: 1fr 1.1fr;
    gap:18px;
    align-items:stretch;
    margin-bottom:22px;
  }
  @media(max-width:740px){ .stage{grid-template-columns:1fr;} }

  .panel{
    background:var(--card);
    border-radius:28px;
    box-shadow:var(--shadow);
    padding:22px;
    position:relative;
    overflow:hidden;
  }

  /* ---- КАПСУЛА ПРОГРЕССА ---- */
  .jar-panel{display:flex;flex-direction:column;align-items:center;gap:6px;}
  .amount{font-family:'Baloo 2';font-weight:800;font-size:clamp(26px,7vw,40px);line-height:1;}
  .amount small{font-weight:600;color:var(--ink-soft);font-size:.5em;}
  .sub{color:var(--ink-soft);font-size:15px;text-align:center;margin-bottom:30px;}
  .sub b{color:var(--accent);}

  .jar{
    position:relative;
    width:130px;
    height:300px;
    margin-top:4px;
  }
  /* верхняя крышка-горловина капсулы */
  .jar-lid{
    position:absolute;top:-10px;left:50%;transform:translateX(-50%);
    width:54px;height:20px;border-radius:8px 8px 4px 4px;
    background:linear-gradient(#5b6473,#3a4150);
    box-shadow:inset 0 2px 2px rgba(255,255,255,.25), 0 3px 6px rgba(0,0,0,.2);
    z-index:4;
  }
  .jar-lid:before{
    content:"";position:absolute;top:-6px;left:50%;transform:translateX(-50%);
    width:30px;height:8px;border-radius:5px;background:#3a4150;
  }
  /* стеклянный цилиндр с закруглённым низом */
  .jar-body{
    position:absolute;inset:0;
    border:4px solid rgba(63,185,143,.55);
    border-radius:26px 26px 60px 60px;
    background:linear-gradient(180deg, rgba(255,255,255,.55), rgba(232,247,242,.35));
    overflow:hidden;
    box-shadow:
      inset 0 0 30px rgba(255,255,255,.6),
      0 0 22px rgba(63,185,143,.45),
      0 14px 30px rgba(42,157,118,.25);
  }
  .liquid{
    position:absolute;left:0;right:0;bottom:0;
    height:0%;
    background:linear-gradient(180deg,var(--liquid1),var(--liquid2) 55%,var(--liquid3));
    transition:height 1.1s cubic-bezier(.34,1.4,.5,1);
  }
  .liquid:before{
    content:"";position:absolute;top:-12px;left:-50%;
    width:200%;height:24px;border-radius:45%;
    background:#fff;opacity:.28;animation:wave 4s linear infinite;
  }
  @keyframes wave{from{transform:translateX(0) rotate(0)}to{transform:translateX(25%) rotate(360deg)}}
  /* пузырьки */
  .bubbles span{
    position:absolute;bottom:0;border-radius:50%;
    background:rgba(255,255,255,.6);
    animation:rise linear infinite;
  }
  @keyframes rise{
    0%{transform:translateY(0);opacity:0}
    15%{opacity:.8}
    100%{transform:translateY(-260px);opacity:0}
  }
  .pct{
    position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);
    font-family:'Baloo 2';font-weight:800;font-size:30px;color:#fff;
    text-shadow:0 2px 6px rgba(0,0,0,.35);z-index:6;
  }
  .ticks{position:absolute;right:-1px;top:10px;bottom:30px;width:14px;z-index:6;}
  .ticks span{position:absolute;right:0;width:9px;height:2px;background:rgba(63,185,143,.45);border-radius:2px;}

  /* ---- ДЕРЕВО ---- */
  .tree-panel{display:flex;flex-direction:column;align-items:center;justify-content:flex-end;}
  .tree-stagelabel{position:absolute;top:18px;left:0;right:0;text-align:center;color:var(--ink-soft);font-weight:600;}
  .tree-wrap{width:100%;max-width:340px;}
  svg{width:100%;height:auto;display:block;}
  .grow{transition:all 1.1s cubic-bezier(.34,1.4,.5,1);transform-origin:center bottom;}
  .leaf{transition:transform 1s cubic-bezier(.34,1.6,.5,1),opacity .8s;transform-origin:center bottom;}
  @keyframes sway{0%,100%{transform:rotate(-1.2deg)}50%{transform:rotate(1.2deg)}}
  .crown{transform-origin:center bottom;animation:sway 6s ease-in-out infinite;}

  /* ---- КНОПКИ ---- */
  .actions{display:flex;flex-wrap:wrap;gap:12px;margin-bottom:22px;}
  .btn{
    flex:1 1 150px;
    border:none;cursor:pointer;
    font-family:'Baloo 2';font-weight:700;font-size:18px;color:#fff;
    padding:18px 16px;border-radius:20px;
    box-shadow:0 6px 0 rgba(0,0,0,.12),var(--shadow);
    transition:transform .08s, box-shadow .08s;
    display:flex;flex-direction:column;align-items:center;gap:2px;line-height:1.1;
  }
  .btn small{font-weight:500;font-size:13px;opacity:.95;}
  .btn:active{transform:translateY(4px);box-shadow:0 2px 0 rgba(0,0,0,.12);}
  .btn-shop{background:linear-gradient(#7ec8ff,#4a9fe8);}
  .btn-wash{background:linear-gradient(#9be37d,#5bb84a);}
  .btn-emoji{font-size:22px;}

  .custom{
    background:var(--card);border-radius:24px;box-shadow:var(--shadow);
    padding:18px;margin-bottom:22px;
    display:grid;grid-template-columns: 1fr 1fr auto;gap:10px;align-items:end;
  }
  @media(max-width:560px){ .custom{grid-template-columns:1fr;} }
  .field label{display:block;font-size:13px;color:var(--ink-soft);margin:0 0 5px 4px;font-weight:600;}
  .field input{
    width:100%;border:2px solid #f0e4d2;border-radius:14px;
    padding:13px 14px;font-family:'Fredoka';font-size:16px;color:var(--ink);background:#fffef9;
    outline:none;transition:border-color .15s;
  }
  .field input:focus{border-color:var(--accent);}
  .add-btn{
    background:linear-gradient(var(--accent2),var(--accent));color:#fff;border:none;cursor:pointer;
    font-family:'Baloo 2';font-weight:800;font-size:17px;padding:14px 22px;border-radius:16px;
    box-shadow:0 5px 0 #e0703f;transition:transform .08s,box-shadow .08s;white-space:nowrap;
  }
  .add-btn:active{transform:translateY(3px);box-shadow:0 2px 0 #e0703f;}

  /* ---- ИСТОРИЯ ---- */
  .history{background:var(--card);border-radius:24px;box-shadow:var(--shadow);padding:20px 18px;}
  .history h2{font-family:'Baloo 2';font-size:22px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;}
  .history h2 button{
    font-family:'Fredoka';font-size:13px;font-weight:600;color:var(--ink-soft);
    background:#f4ece0;border:none;border-radius:10px;padding:7px 12px;cursor:pointer;
  }
  .empty{color:var(--ink-soft);text-align:center;padding:24px 0;}
  ul{list-style:none;}
  li{
    display:flex;align-items:center;gap:12px;padding:12px 6px;
    border-bottom:1px dashed #efe3d2;animation:pop .35s ease;
  }
  @keyframes pop{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:none}}
  li:last-child{border-bottom:none;}
  .li-ico{width:38px;height:38px;border-radius:12px;display:grid;place-items:center;font-size:19px;flex:0 0 auto;}
  .li-main{flex:1;min-width:0;}
  .li-label{font-weight:600;}
  .li-date{font-size:12px;color:var(--ink-soft);}
  .li-amt{font-family:'Baloo 2';font-weight:800;color:var(--liquid3);font-size:18px;}
  .li-del{background:none;border:none;cursor:pointer;color:#d9b8a0;font-size:18px;padding:4px;line-height:1;}
  .li-del:hover{color:var(--accent);}
  .toast{
    position:fixed;left:50%;bottom:24px;transform:translateX(-50%) translateY(20px);
    background:var(--ink);color:#fff;padding:12px 22px;border-radius:30px;font-weight:600;
    opacity:0;pointer-events:none;transition:.3s;z-index:50;box-shadow:var(--shadow);
  }
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Наша копилка</h1>
    <p>Копим на цель — <b id="goalLabel"></b></p>
    <p id="status" style="font-size:13px;margin-top:2px;"></p>
  </header>

  <div class="stage">
    <!-- КАПСУЛА -->
    <div class="panel jar-panel">
      <div class="amount"><span id="total">0</span> <small>₽</small></div>
      <div class="sub">Осталось собрать: <b id="left"></b></div>
      <div class="jar">
        <div class="jar-lid"></div>
        <div class="jar-body">
          <div class="liquid" id="liquid"></div>
          <div class="bubbles" id="bubbles"></div>
          <div class="pct" id="pct">0%</div>
          <div class="ticks" id="ticks"></div>
        </div>
      </div>
    </div>

    <!-- ДЕРЕВО -->
    <div class="panel tree-panel">
      <div class="tree-stagelabel" id="treeLabel">Семечко 🌱</div>
      <div class="tree-wrap">
        <svg viewBox="0 0 300 300" id="treeSvg">
          <!-- земля -->
          <ellipse cx="150" cy="282" rx="120" ry="16" fill="#e7c9a3"/>
          <ellipse cx="150" cy="280" rx="100" ry="12" fill="#d8b489"/>
          <!-- ствол -->
          <g class="grow" id="trunk" style="transform:scaleY(0);">
            <path d="M142 280 Q140 200 150 150 Q160 200 158 280 Z" fill="#9c6b3f"/>
            <path d="M150 230 Q120 210 105 188" stroke="#9c6b3f" stroke-width="7" fill="none" stroke-linecap="round"/>
            <path d="M150 215 Q182 200 198 178" stroke="#9c6b3f" stroke-width="7" fill="none" stroke-linecap="round"/>
          </g>
          <!-- крона -->
          <g class="crown" id="crown">
            <g class="leaf" id="l1" style="opacity:0;transform:scale(0)">
              <circle cx="150" cy="120" r="46" fill="#5bb84a"/></g>
            <g class="leaf" id="l2" style="opacity:0;transform:scale(0)">
              <circle cx="108" cy="150" r="34" fill="#6cc95a"/></g>
            <g class="leaf" id="l3" style="opacity:0;transform:scale(0)">
              <circle cx="192" cy="150" r="34" fill="#4da93d"/></g>
            <g class="leaf" id="l4" style="opacity:0;transform:scale(0)">
              <circle cx="150" cy="92" r="30" fill="#7ed36a"/></g>
            <!-- цветы/плоды -->
            <g class="leaf" id="fruits" style="opacity:0;transform:scale(0)">
              <circle cx="128" cy="118" r="7" fill="#ff6b6b"/>
              <circle cx="172" cy="130" r="7" fill="#ffd166"/>
              <circle cx="150" cy="100" r="7" fill="#ff8c5a"/>
              <circle cx="116" cy="148" r="6" fill="#ff6b6b"/>
              <circle cx="186" cy="150" r="6" fill="#ffd166"/>
            </g>
          </g>
          <!-- росток (для семечка) -->
          <g class="leaf" id="sprout" style="opacity:0;transform:scale(0)">
            <path d="M150 280 Q150 255 150 245" stroke="#6cc95a" stroke-width="5" fill="none" stroke-linecap="round"/>
            <ellipse cx="138" cy="248" rx="12" ry="7" fill="#6cc95a" transform="rotate(-30 138 248)"/>
            <ellipse cx="162" cy="248" rx="12" ry="7" fill="#6cc95a" transform="rotate(30 162 248)"/>
          </g>
        </svg>
      </div>
    </div>
  </div>

  <!-- КНОПКИ -->
  <div class="actions">
    <button class="btn btn-shop" onclick="add(150,'Магазин','🛒')">
      <span class="btn-emoji">🛒</span> +150 ₽ <small>Магазин</small>
    </button>
    <button class="btn btn-wash" onclick="add(1000,'Мытьё','🧽')">
      <span class="btn-emoji">🧽</span> +1000 ₽ <small>Мытьё</small>
    </button>
  </div>

  <!-- СВОБОДНОЕ ПОЛЕ -->
  <div class="custom">
    <div class="field">
      <label>Сумма, ₽</label>
      <input type="number" id="cAmount" placeholder="напр. 500" min="1" inputmode="numeric">
    </div>
    <div class="field">
      <label>За что (необязательно)</label>
      <input type="text" id="cLabel" placeholder="напр. Помощь бабушке">
    </div>
    <button class="add-btn" onclick="addCustom()">Добавить ✨</button>
  </div>

  <!-- ИСТОРИЯ -->
  <div class="history">
    <h2>История пополнений <button onclick="clearAll()">Очистить</button></h2>
    <ul id="list"></ul>
    <div class="empty" id="empty">Пока пусто — добавь первое пополнение! 🌟</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
/* ============================================================
   НАСТРОЙКА СИНХРОНИЗАЦИИ — заполните 2 строки ниже
   (как их получить — см. инструкцию, которую дал помощник)
   ============================================================ */
const SUPABASE_URL = "https://gapekgflfvodzetwkrlo.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImdhcGVrZ2ZsZnZvZHpldHdrcmxvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODAxNDAwNDUsImV4cCI6MjA5NTcxNjA0NX0.CtoFedyFlH4t1_pas1n2gP4UB49MnbK6_t-Y2-xYC74";
/* ============================================================ */

const GOAL = 85000;
const KEY = 'kopilka_entries_v1';        // запасное локальное хранилище
let entries = [];
let cloud = null;                        // клиент Supabase, если настроен

const fmt = n => n.toLocaleString('ru-RU');
const configured = () => SUPABASE_URL.startsWith('http') && SUPABASE_KEY.length > 20;

/* ---------- ХРАНИЛИЩЕ ---------- */
async function loadAll(){
  if(cloud){
    const { data, error } = await cloud.from('entries').select('*').order('t',{ascending:true});
    if(error){ console.error(error); setStatus('Ошибка загрузки',false); return; }
    entries = data.map(r=>({id:r.id, amount:r.amount, label:r.label, icon:r.icon, t:r.t}));
    render();
  }else{
    try{ entries = JSON.parse(localStorage.getItem(KEY)) || []; }catch(e){ entries = []; }
    render();
  }
}
function saveLocal(){ localStorage.setItem(KEY, JSON.stringify(entries)); }

async function add(amount, label, icon){
  const row = {id:(crypto.randomUUID?crypto.randomUUID():String(Date.now()+Math.random())),
               amount, label, icon, t:Date.now()};
  if(cloud){
    entries.push(row); render(); toast(`+${fmt(amount)} ₽ • ${label}`);
    const { error } = await cloud.from('entries').insert(row);
    if(error){ console.error(error); toast('Не сохранилось в облако'); }
  }else{
    entries.push(row); saveLocal(); render(); toast(`+${fmt(amount)} ₽ • ${label}`);
  }
}
function addCustom(){
  const a = Math.round(parseFloat(document.getElementById('cAmount').value));
  let l = document.getElementById('cLabel').value.trim();
  if(!a || a<=0){ toast('Введите сумму больше нуля'); return; }
  if(!l) l = 'Пополнение';
  add(a, l, '💰');
  document.getElementById('cAmount').value='';
  document.getElementById('cLabel').value='';
}
async function del(id){
  entries = entries.filter(e=>e.id!==id); render();
  if(cloud){ const {error}=await cloud.from('entries').delete().eq('id',id); if(error)console.error(error); }
  else saveLocal();
}
async function clearAll(){
  if(!entries.length) return;
  if(!confirm('Очистить всю историю и обнулить копилку?')) return;
  if(cloud){
    const ids = entries.map(e=>e.id);
    entries=[]; render();
    const {error}=await cloud.from('entries').delete().in('id',ids); if(error)console.error(error);
  }else{ entries=[]; saveLocal(); render(); }
}

function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(t._tm); t._tm=setTimeout(()=>t.classList.remove('show'),1800);
}

function total(){ return entries.reduce((s,e)=>s+e.amount,0); }

/* ---------- ДЕРЕВО ---------- */
function treeStage(pct){
  if(pct < 5)  return 0;
  if(pct < 35) return 1;
  if(pct < 65) return 2;
  if(pct < 100)return 3;
  return 4;
}
const STAGE_LABELS = ['Семечко 🌱','Росток 🌿','Деревце 🌳','Крепкое дерево 🌳','Цветёт и плодоносит! 🎉'];

function setTree(pct){
  const st = treeStage(pct);
  document.getElementById('treeLabel').textContent = STAGE_LABELS[st];
  const sprout=document.getElementById('sprout');
  const trunk=document.getElementById('trunk');
  const L=[null,document.getElementById('l1'),document.getElementById('l2'),
           document.getElementById('l3'),document.getElementById('l4')];
  const fruits=document.getElementById('fruits');
  const show=(el,on,scale)=>{ el.style.opacity=on?1:0; el.style.transform=`scale(${on?(scale||1):0})`; };
  show(sprout, st===0, 1);
  trunk.style.transform = st>=1 ? 'scaleY(1)' : 'scaleY(0)';
  show(L[1], st>=1); show(L[4], st>=1);
  show(L[2], st>=2); show(L[3], st>=2);
  show(fruits, st>=4);
}

/* ---------- ОТРИСОВКА ---------- */
function render(){
  const tot = total();
  const pct = Math.min(100, tot/GOAL*100);
  document.getElementById('total').textContent = fmt(tot);
  document.getElementById('left').textContent = fmt(Math.max(0, GOAL-tot)) + ' ₽';
  document.getElementById('pct').textContent = Math.round(pct)+'%';
  document.getElementById('liquid').style.height = pct+'%';
  setTree(pct);

  const list=document.getElementById('list');
  const empty=document.getElementById('empty');
  list.innerHTML='';
  if(!entries.length){ empty.style.display='block'; return; }
  empty.style.display='none';
  [...entries].sort((a,b)=>b.t-a.t).forEach(e=>{
    const d=new Date(e.t);
    const date=d.toLocaleDateString('ru-RU')+' '+d.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
    const li=document.createElement('li');
    li.innerHTML=`
      <div class="li-ico" style="background:#f4ece0">${e.icon||'💰'}</div>
      <div class="li-main">
        <div class="li-label">${escapeHtml(e.label)}</div>
        <div class="li-date">${date}</div>
      </div>
      <div class="li-amt">+${fmt(e.amount)} ₽</div>
      <button class="li-del" title="Удалить">✕</button>`;
    li.querySelector('.li-del').onclick=()=>del(e.id);
    list.appendChild(li);
  });
}
function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

function setStatus(text, ok){
  const el=document.getElementById('status');
  if(!el) return;
  el.textContent=text;
  el.style.color = ok ? '#2a9d76' : '#c0703f';
}

/* ---------- ДЕКОР КАПСУЛЫ ---------- */
(function(){
  const ticks=document.getElementById('ticks');
  for(let i=1;i<10;i++){const s=document.createElement('span');s.style.bottom=(i*10)+'%';ticks.appendChild(s);}
  const b=document.getElementById('bubbles');
  for(let i=0;i<7;i++){
    const sp=document.createElement('span');
    const size=4+Math.random()*7;
    sp.style.width=size+'px';sp.style.height=size+'px';
    sp.style.left=(8+Math.random()*84)+'%';
    sp.style.animationDuration=(3.5+Math.random()*3.5)+'s';
    sp.style.animationDelay=(Math.random()*4)+'s';
    b.appendChild(sp);
  }
})();

document.getElementById('goalLabel').textContent = fmt(GOAL)+' ₽';
document.getElementById('cAmount').addEventListener('keydown',e=>{if(e.key==='Enter')addCustom();});
document.getElementById('cLabel').addEventListener('keydown',e=>{if(e.key==='Enter')addCustom();});

/* ---------- ЗАПУСК ---------- */
(async function init(){
  if(configured() && window.supabase){
    cloud = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    setStatus('☁️ Синхронизация включена', true);
    await loadAll();
    // живое обновление при изменениях с других устройств
    cloud.channel('entries-changes')
      .on('postgres_changes', { event:'*', schema:'public', table:'entries' }, loadAll)
      .subscribe();
  }else{
    setStatus('📱 Локальный режим (без синхронизации)', false);
    await loadAll();
  }
})();
</script>
